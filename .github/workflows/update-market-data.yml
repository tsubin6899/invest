name: Update market data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * 1-5"

permissions:
  contents: write

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest prices and exchange rates
        run: python update_prices.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update market data"
          file_pattern: latest-prices.json latest-rates.json
