name: Update market data

on:
  workflow_dispatch:
    inputs:
      symbols_json:
        description: "Current dashboard symbols, including watchlists"
        required: false
        type: string
  schedule:
    - cron: "30 5 * * 1-5"

permissions:
  contents: write

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply requested symbol list
        if: ${{ inputs.symbols_json != '' }}
        env:
          SYMBOLS_JSON: ${{ inputs.symbols_json }}
        run: python -c "import os; from pathlib import Path; Path('price-symbols.json').write_text(os.environ['SYMBOLS_JSON'], encoding='utf-8')"

      - name: Fetch latest prices and exchange rates
        run: python update_prices.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update market data"
          file_pattern: price-symbols.json latest-prices.json latest-rates.json latest-valuations.json
