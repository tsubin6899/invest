<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>個人資產儀表板｜阿斌Tsubin</title>
  <style>
    :root {
      --bg: #f4f8fb;
      --ink: #142033;
      --muted: #667485;
      --line: #dfe6ee;
      --surface: #ffffff;
      --blue: #2368d8;
      --shadow: 0 14px 34px rgba(21, 32, 49, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    }
    .shell {
      width: min(1500px, calc(100vw - 28px));
      margin: 14px auto 28px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,.86);
      box-shadow: var(--shadow);
    }
    .frame-panel {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 10px 26px rgba(21,32,49,.05);
    }
    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 70px);
      min-height: 780px;
      border: 0;
      background: #fff;
    }
    @media (max-width: 1050px) {
      iframe { height: 760px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <article class="frame-panel">
      <iframe src="personal-assets-dashboard.html" title="個人資產儀表板"></iframe>
    </article>
  </main>
</body>
</html>
