<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>個人資產儀表板｜阿斌Tsubin</title>
  <style>
    :root {
      --bg: #f4f8fb;
      --panel: #ffffff;
      --panel-2: #f6f8fb;
      --ink: #142033;
      --muted: #667485;
      --line: #dfe6ee;
      --navy: #101c34;
      --blue: #2368d8;
      --green: #24b370;
      --purple: #8b3fb6;
      --amber: #d99213;
      --red: #c64b4b;
      --teal: #207f86;
      --shadow: 0 14px 34px rgba(21, 32, 49, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .shell {
      width: min(1500px, calc(100vw - 34px));
      margin: 12px auto 32px;
      padding: 24px 28px 28px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,.82);
      box-shadow: var(--shadow);
    }
    .hero {
      min-height: 130px;
      padding: 30px 28px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(90deg, #dfeeff 0%, #f8fbff 48%, #fff 100%);
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 34px; line-height: 1.18; letter-spacing: 0; }
    .sub { margin-top: 10px; color: var(--muted); font-size: 14px; }
    .actions, .tabs, .toolbox {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .actions {
      justify-content: flex-end;
      min-height: 64px;
      margin: 20px 0;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fbfcfe;
    }
    .btn {
      min-height: 38px;
      border: 0;
      border-radius: 999px;
      padding: 8px 17px;
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
    }
    .btn.purple { background: var(--purple); }
    .btn.green { background: var(--green); }
    .btn.blue { background: var(--blue); }
    .btn.dark { background: var(--navy); }
    .btn.small { min-height: 32px; padding: 6px 12px; font-size: 13px; }
    .icon-btn {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #fff;
      color: var(--muted);
    }
    .tabs {
      margin-bottom: 46px;
      padding: 10px 14px;
      border-radius: 14px;
      background: #f3f6fa;
      box-shadow: inset 0 0 0 1px rgba(223,230,238,.6);
    }
    .tab {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #263245;
      min-height: 36px;
      padding: 8px 14px;
      font-weight: 700;
    }
    .tab.active { background: var(--navy); color: #fff; }
    .view { display: none; }
    .view.active { display: block; }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 20px;
    }
    .section-head h2 { font-size: 28px; letter-spacing: 0; }
    .section-note { margin-top: 8px; color: var(--muted); font-size: 14px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .card, .panel {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 10px 26px rgba(21,32,49,.05);
    }
    .card {
      min-height: 132px;
      padding: 22px 20px;
    }
    .card.dark { background: linear-gradient(135deg, #101c34, #1d3a82); color: #fff; }
    .card.accent { background: #eef6ff; border-color: #7bb4be; }
    .label { color: var(--muted); font-size: 14px; }
    .dark .label { color: rgba(255,255,255,.78); }
    .number {
      display: block;
      margin-top: 8px;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0;
    }
    .unit { color: var(--muted); font-size: 13px; }
    .gain { color: var(--red); }
    .ok { color: var(--green); }
    .amber { color: var(--amber); }
    .panel { overflow: hidden; margin-top: 16px; }
    .panel-pad { padding: 18px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 920px; font-size: 14px; }
    th, td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 12px 12px;
      text-align: left;
      vertical-align: middle;
    }
    th:last-child, td:last-child { border-right: 0; }
    th { background: #f3f6fa; color: #334155; font-weight: 700; }
    tr:last-child td { border-bottom: 0; }
    input, select {
      min-height: 34px;
      border: 1px solid #cfd8e3;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 7px 9px;
      max-width: 100%;
    }
    input[type="number"] { width: 118px; }
    input[type="checkbox"] {
      width: 32px;
      height: 32px;
      accent-color: var(--green);
    }
    .toolbar {
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fbfcfe;
    }
    .search { min-width: 250px; }
    .gold-summary {
      padding: 22px 18px;
      line-height: 2.15;
      font-size: 16px;
    }
    .gold-summary strong {
      color: var(--amber);
      font-size: 34px;
      margin: 0 8px;
    }
    .muted { color: var(--muted); }
    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
    }
    .asset-grid {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 22px;
      align-items: center;
    }
    .donut {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: conic-gradient(var(--blue) 0 var(--tw), var(--green) var(--tw) var(--us), var(--amber) var(--us) var(--cash), var(--purple) var(--cash) 360deg);
      position: relative;
      margin: auto;
    }
    .donut:after {
      content: "";
      position: absolute;
      inset: 54px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid var(--line);
    }
    .donut-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      z-index: 1;
      text-align: center;
    }
    .legend { display: grid; gap: 12px; }
    .legend-row {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }
    .chart-pair {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin: 16px 0;
    }
    .chart-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 18px;
    }
    .chart-card h3 {
      margin: 0 0 14px;
      font-size: 18px;
    }
    .portfolio-donut {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: var(--chart-bg, #eef2f7);
      position: relative;
      margin: 0 auto 16px;
    }
    .portfolio-donut:after {
      content: "";
      position: absolute;
      inset: 48px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid var(--line);
    }
    .portfolio-donut .donut-text strong {
      font-size: 20px;
    }
    .chart-empty {
      min-height: 210px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: #f8fafc;
      border: 1px dashed #cfd8e3;
      border-radius: 14px;
      margin-bottom: 16px;
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--c); }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .bar-list { display: grid; gap: 12px; }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) minmax(180px, 2fr) auto;
      gap: 12px;
      align-items: center;
      font-size: 14px;
    }
    .bar-track {
      height: 12px;
      border-radius: 999px;
      background: #edf2f7;
      overflow: hidden;
    }
    .bar-fill {
      display: block;
      height: 100%;
      width: var(--w);
      background: var(--bar, var(--blue));
      border-radius: inherit;
    }
    .trend-line {
      width: 100%;
      min-height: 240px;
    }
    .trend-line svg {
      display: block;
      width: 100%;
      height: 240px;
    }
    .trend-line .axis {
      stroke: #d6dee8;
      stroke-width: 1;
    }
    .trend-line .series {
      fill: none;
      stroke: var(--blue);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .trend-line .point { fill: var(--blue); }
    .notice {
      margin-top: 14px;
      padding: 14px 16px;
      border: 1px dashed #cfd8e3;
      border-radius: 12px;
      color: var(--muted);
      background: #fbfcfe;
      line-height: 1.7;
    }
    .setting-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .setting-tile {
      min-height: 92px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
    .setting-tile .label {
      display: block;
      margin-bottom: 8px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .setting-tile input {
      width: 100%;
      max-width: 100%;
      min-height: 34px;
      font-size: 16px;
      font-weight: 700;
    }
    .setting-tile .unit {
      display: block;
      margin-top: 7px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .day-card {
      min-height: 116px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      display: grid;
      align-content: start;
      gap: 7px;
    }
    .day-card.empty {
      background: #f8fafc;
      border-style: dashed;
    }
    .day-card strong { font-size: 15px; }
    .day-card .delta { font-size: 18px; font-weight: 800; }
    .day-card small { color: var(--muted); line-height: 1.45; }
    @media (max-width: 1100px) {
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .asset-grid, .split, .chart-pair, .chart-grid { grid-template-columns: 1fr; }
      .calendar-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .tabs { margin-bottom: 28px; }
    }
    @media (max-width: 720px) {
      .shell { width: 100%; margin: 0; border-radius: 0; padding: 16px; }
      h1 { font-size: 27px; }
      .section-head { align-items: flex-start; flex-direction: column; }
      .cards { grid-template-columns: 1fr; }
      .calendar-grid { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>個人資產儀表板｜阿斌Tsubin</h1>
      <p class="sub">本檔案使用本機瀏覽器儲存資料，可管理台股、美股、現金、貴金屬、定期投入與支出規畫。</p>
    </section>

    <section class="actions" aria-label="操作工具">
      <button class="btn purple" id="exportCsv">匯出報表 (CSV)</button>
      <button class="btn blue" id="exportSymbols">匯出代碼清單</button>
      <button class="btn green" id="importPrices">套用最新股價與匯率</button>
      <button class="btn green" id="saveData">匯入存檔</button>
      <button class="btn blue" id="exportJson">匯出存檔 (JSON)</button>
      <button class="btn dark" id="resetData">清空資料</button>
      <input type="file" id="importJson" accept="application/json" hidden>
      <input type="file" id="priceJson" accept="application/json" hidden>
    </section>

    <nav class="tabs" id="tabs" aria-label="資產分頁"></nav>

    <section class="view active" id="overview"></section>
    <section class="view" id="tw"></section>
    <section class="view" id="us"></section>
    <section class="view" id="cash"></section>
    <section class="view" id="gold"></section>
    <section class="view" id="silver"></section>
    <section class="view" id="fund"></section>
    <section class="view" id="dca"></section>
    <section class="view" id="purchase"></section>
    <section class="view" id="expense"></section>
    <section class="view" id="allocation"></section>
    <section class="view" id="chart"></section>
  </main>

  <script>
    const storageKey = "personal-assets-dashboard-tsubin-v2";
    const tabs = [
      ["overview", "總覽儀表板"], ["tw", "台股部位"], ["us", "美股部位"], ["cash", "現金帳戶"],
      ["gold", "實體黃金"], ["silver", "實體白銀"], ["fund", "台幣基金"], ["dca", "定期投入"],
      ["purchase", "購買股票紀錄"],
      ["expense", "支出規畫"], ["allocation", "額外資金分配"],
      ["chart", "資訊圖表庫"]
    ];
    const seed = {
      rates: { usd: 31.8, goldGram: 2980, silverOz: 1850, reserve: 0 },
      fxRates: { TWD: 1, USD: 31.8, JPY: 0.22, EUR: 34.5, CNY: 4.4, HKD: 4.05 },
      fxRateMeta: { generatedAt: "", source: "手動設定" },
      tw: [],
      us: [],
      cash: [],
      cards: [],
      gold: [],
      silver: [],
      funds: [],
      dca: [],
      dcaTargets: [],
      purchaseRecords: [],
      budget: [],
      pnlCalendar: [],
      assetSnapshots: [],
      dividends: [],
      safety: { monthlyExpense: 0, safetyMonths: 6 },
      targetAllocation: { tw: 40, us: 20, cash: 20, gold: 10, silver: 0, fund: 10 },
      allocation: []
    };
    let data = load();
    let currentTab = "overview";
    let calendarMonth = null;

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        return saved ? {
          ...structuredClone(seed),
          ...saved,
          rates: { ...seed.rates, ...(saved.rates || {}) },
          fxRates: { ...seed.fxRates, ...(saved.fxRates || {}) },
          fxRateMeta: { ...seed.fxRateMeta, ...(saved.fxRateMeta || {}) },
          safety: { ...seed.safety, ...(saved.safety || {}) },
          targetAllocation: { ...seed.targetAllocation, ...(saved.targetAllocation || {}) }
        } : structuredClone(seed);
      }
      catch { return structuredClone(seed); }
    }
    function persist() {
      localStorage.setItem(storageKey, JSON.stringify(data));
      toast("資料已儲存在本機瀏覽器");
    }
    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(data));
    }
    function hydrateData(payload) {
      return {
        ...structuredClone(seed),
        ...(payload || {}),
        rates: { ...seed.rates, ...((payload || {}).rates || {}) },
        fxRates: { ...seed.fxRates, ...((payload || {}).fxRates || {}) },
        fxRateMeta: { ...seed.fxRateMeta, ...((payload || {}).fxRateMeta || {}) },
        safety: { ...seed.safety, ...((payload || {}).safety || {}) },
        targetAllocation: { ...seed.targetAllocation, ...((payload || {}).targetAllocation || {}) }
      };
    }
    function purchaseRecordKey(row) {
      return [
        row.date || "",
        tradeType(row),
        String(row.market || "TW").toUpperCase(),
        tradeCurrency(row),
        String(row.code || "").toUpperCase(),
        String(row.name || "").trim(),
        Number(row.shares) || 0,
        Number(row.price) || 0,
        Number(row.fee) || 0,
        Number(row.tax) || 0,
        String(row.note || "").trim()
      ].join("|");
    }
    function mergePurchaseRecords(records) {
      const existing = new Set((data.purchaseRecords || []).map(purchaseRecordKey));
      let added = 0;
      (records || []).forEach(row => {
        const key = purchaseRecordKey(row);
        if (existing.has(key)) return;
        data.purchaseRecords.push(row);
        existing.add(key);
        added += 1;
      });
      return added;
    }
    function money(n, currency = "TWD") {
      return new Intl.NumberFormat("zh-TW", { maximumFractionDigits: currency === "USD" ? 2 : 0 }).format(Number(n) || 0);
    }
    function moneyFixed(n, currency = "TWD", digits = 2) {
      return new Intl.NumberFormat("zh-TW", { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(Number(n) || 0);
    }
    function rateText(n) {
      return new Intl.NumberFormat("zh-TW", { minimumFractionDigits: 0, maximumFractionDigits: 6 }).format(Number(n) || 0);
    }
    function sum(rows, fn) { return rows.reduce((t, r) => t + fn(r), 0); }
    function normalizeCurrency(value) { return String(value || "TWD").trim().toUpperCase(); }
    function fxRate(currency) { return Number(data.fxRates?.[normalizeCurrency(currency)] ?? 1) || 1; }
    function twdCash(row) { return (Number(row.amount) || 0) * fxRate(row.currency); }
    function stockValue(rows, fx = 1) { return sum(rows, r => r.shares * r.price * fx); }
    function stockCost(rows, fx = 1) { return sum(rows, r => r.shares * r.cost * fx); }
    function goldCost() { return sum(data.gold, r => r.gold + r.labor); }
    function goldGram() { return sum(data.gold, r => r.gram); }
    function silverCost() { return sum(data.silver, r => r.cost); }
    function silverOz() { return sum(data.silver, r => r.qty * r.oz); }
    function allTotals() {
      const tw = stockValue(data.tw);
      const us = stockValue(data.us, data.rates.usd);
      const cash = sum(data.cash, twdCash) + (Number(data.rates.reserve) || 0);
      const cards = sum(data.cards, r => r.amount);
      const gold = goldGram() * data.rates.goldGram;
      const silver = silverOz() * data.rates.silverOz;
      const fund = sum(data.funds, r => r.units * r.nav);
      const total = tw + us + cash + gold + silver + fund - cards;
      const cost = stockCost(data.tw) + stockCost(data.us, data.rates.usd) + goldCost() + silverCost() + sum(data.funds, r => r.cost);
      const gain = (tw + us + gold + silver + fund) - cost;
      return { tw, us, cash, cards, gold, silver, fund, total, cost, gain };
    }
    function card(label, value, unit, cls = "") {
      return `<article class="card ${cls}"><span class="label">${label}</span><strong class="number">${value}</strong><span class="unit">${unit}</span></article>`;
    }
    function settingTile(label, value, unit) {
      return `<div class="setting-tile"><span class="label">${label}</span>${value}<span class="unit">${unit}</span></div>`;
    }
    function localDateString(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }
    function localMonthString(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      return `${year}-${month}`;
    }
    function shiftMonth(month, delta) {
      const [year, monthNumber] = month.split("-").map(Number);
      const date = new Date(year, monthNumber - 1 + delta, 1);
      return localMonthString(date);
    }
    function textInput(value, path, type = "text") {
      const step = type === "number" ? ` step="any"` : "";
      return `<input type="${type}"${step} value="${value}" data-path="${path}">`;
    }
    function dateInput(value, path) {
      return textInput(value || localDateString(), path, "date");
    }
    function selectInput(value, path, options) {
      return `<select data-path="${path}">${options.map(([val, label]) => `<option value="${val}" ${String(value || options[0][0]) === val ? "selected" : ""}>${label}</option>`).join("")}</select>`;
    }
    function section(id, title, note = "", tools = "") {
      return `<div class="section-head"><div><h2>${title}</h2>${note ? `<p class="section-note">${note}</p>` : ""}</div>${tools}</div>`;
    }
    const chartColors = ["#2368d9", "#16a36a", "#d99a21", "#7c3aed", "#e25555", "#0891b2", "#db2777", "#64748b", "#84cc16", "#f97316"];
    function renderTabs() {
      document.getElementById("tabs").innerHTML = tabs.map(([id, label]) => `<button class="tab ${id === currentTab ? "active" : ""}" data-tab="${id}">${label}</button>`).join("");
    }
    function renderPieChart(title, items, totalLabel, currency) {
      const filtered = items.filter(item => Number(item.value) > 0);
      const total = sum(filtered, item => item.value);
      if (!total) {
        return `<article class="chart-card"><h3>${title}</h3><div class="chart-empty">尚無可呈現資料</div></article>`;
      }
      let cursor = 0;
      const segments = filtered.map((item, index) => {
        const start = cursor;
        const end = cursor + item.value / total * 360;
        cursor = end;
        return `${chartColors[index % chartColors.length]} ${start.toFixed(3)}deg ${end.toFixed(3)}deg`;
      }).join(", ");
      return `<article class="chart-card">
        <h3>${title}</h3>
        <div class="portfolio-donut" style="--chart-bg:conic-gradient(${segments});"><div class="donut-text"><strong>${money(total, currency)}</strong><span class="muted">${totalLabel}</span></div></div>
        <div class="legend">${filtered.map((item, index) => {
          const pct = item.value / total * 100;
          return `<div class="legend-row"><span class="dot" style="--c:${chartColors[index % chartColors.length]}"></span><strong>${item.label}</strong><span>${pct.toFixed(1)}%｜${money(item.rawValue ?? item.value, currency)}</span></div>`;

    function cashBankShareItems() {

    function renderCashCharts() {
      return `<div class="chart-pair">

        ${renderPieChart("台幣與其他外幣持有比例", cashCurrencyShareItems(), "折合台幣", "TWD")}
      </div>`;
    }
    function renderBarChart(title, rows, currency = "TWD") {
      const filtered = rows.filter(row => Number(row.value) > 0 || Number(row.rawValue) !== 0);
      const max = Math.max(...filtered.map(row => Math.abs(Number(row.value) || Number(row.rawValue) || 0)), 0);
      if (!filtered.length || !max) {
        return `<article class="chart-card"><h3>${title}</h3><div class="chart-empty">尚無可呈現資料</div></article>`;
      }
      return `<article class="chart-card"><h3>${title}</h3><div class="bar-list">${filtered.map((row, index) => {
        const raw = Number(row.rawValue ?? row.value) || 0;
        const width = Math.max(3, Math.abs(Number(row.value) || raw) / max * 100);
        const color = row.color || (raw < 0 ? "var(--red)" : chartColors[index % chartColors.length]);
        const displayValue = currency === "%" ? `${raw.toFixed(1)}%` : money(raw, currency);
        return `<div class="bar-row"><strong>${row.label}</strong><div class="bar-track"><span class="bar-fill" style="--w:${width.toFixed(1)}%;--bar:${color}"></span></div><span class="${raw < 0 ? "gain" : "ok"}">${displayValue}</span></div>`;
      }).join("")}</div></article>`;
    }
    function renderTrendChart(title, rows) {
      const points = rows
        .filter(row => row.date && Number.isFinite(Number(row.totalGain)))
        .sort((a, b) => String(a.date).localeCompare(String(b.date)))
        .slice(-45);
      if (points.length < 2) {
        return `<article class="chart-card"><h3>${title}</h3><div class="chart-empty">至少需要兩筆快照</div></article>`;
      }
      const values = points.map(row => Number(row.totalGain) || 0);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = max - min || 1;
      const w = 640;
      const h = 240;
      const pad = 24;
      const coords = points.map((row, index) => {
        const x = pad + index / Math.max(points.length - 1, 1) * (w - pad * 2);
        const y = h - pad - ((Number(row.totalGain) || 0) - min) / span * (h - pad * 2);
        return { x, y, row };
      });
      const path = coords.map((p, index) => `${index ? "L" : "M"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
      return `<article class="chart-card"><h3>${title}</h3><div class="trend-line"><svg viewBox="0 0 ${w} ${h}" role="img" aria-label="${title}">
        <line class="axis" x1="${pad}" y1="${h - pad}" x2="${w - pad}" y2="${h - pad}"></line>
        <line class="axis" x1="${pad}" y1="${pad}" x2="${pad}" y2="${h - pad}"></line>
        <path class="series" d="${path}"></path>
        ${coords.map(p => `<circle class="point" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3"><title>${p.row.date} ${money(p.row.totalGain)}</title></circle>`).join("")}
      </svg></div><div class="legend"><div class="legend-row"><span class="dot" style="--c:var(--blue)"></span><strong>最新</strong><span>${money(values.at(-1))} TWD</span></div><div class="legend-row"><span class="dot" style="--c:var(--muted)"></span><strong>區間</strong><span>${money(min)} ~ ${money(max)} TWD</span></div></div></article>`;
    }

    function legacyDcaCodes() {
      const codes = new Set();
      (data.dca || []).forEach(row => {
        Object.keys(row || {}).forEach(key => {
          if (key !== "month") codes.add(key);
        });
      });
      Object.keys(data.rates || {}).forEach(key => {
        if (key.startsWith("dca_")) codes.add(key.slice(4));
      });
      return [...codes].filter(Boolean);
    }
    function ensureDcaTargets() {
      if (!Array.isArray(data.dcaTargets)) data.dcaTargets = [];
      if (!data.dcaTargets.length) {
        const codes = legacyDcaCodes();
        data.dcaTargets = (codes.length ? codes : ["0050", "00981A", "VOO", "QQQ"]).map(code => ({ code, name: "" }));
      }
      data.dcaTargets.forEach((target, index) => {
        if (!target.code) target.code = `TARGET${index + 1}`;
        if (target.name == null) target.name = "";
      });
      return data.dcaTargets;
    }
    function dcaCode(target, index) {
      return String(target.code || `TARGET${index + 1}`).trim();
    }
    function dcaAmount(row, code) {
      const value = row ? row[code] : 0;
      if (typeof value === "boolean") return value ? Number(data.rates[`dca_${code}`]) || 1 : 0;
      return Number(value) || 0;
    }
    function renameDcaTarget(index, nextCode) {
      const targets = ensureDcaTargets();
      const target = targets[index];
      if (!target) return;
      const oldCode = dcaCode(target, index);
      const newCode = String(nextCode || "").trim() || oldCode;
      if (oldCode === newCode) return;
      target.code = newCode;
      const oldRateKey = `dca_${oldCode}`;
      const newRateKey = `dca_${newCode}`;
      if (data.rates[oldRateKey] != null && data.rates[newRateKey] == null) data.rates[newRateKey] = data.rates[oldRateKey];
      delete data.rates[oldRateKey];
      (data.dca || []).forEach(row => {
        if (row[oldCode] != null && row[newCode] == null) row[newCode] = row[oldCode];
        delete row[oldCode];
      });
    }

    function purchaseCost(row) {
      const gross = (Number(row.shares) || 0) * (Number(row.price) || 0);
      const fees = (Number(row.fee) || 0) + (Number(row.tax) || 0);
      return tradeType(row) === "sell" ? Math.max(0, gross - fees) : gross + fees;
    }
    function purchaseCostTwd(row) {
      return purchaseCost(row) * fxRate(tradeCurrency(row));
    }
    function tradeType(row) {
      const value = String(row.type || row.action || "buy").toLowerCase();
      return value === "sell" || value.includes("賣") ? "sell" : "buy";
    }
    function tradeCurrency(row) {
      return normalizeCurrency(row.currency || (row.market === "US" ? "USD" : "TWD"));
    }
    function tradeKey(row) {
      return `${String(row.market || "TW").toUpperCase()}:${String(row.code || "").toUpperCase()}:${tradeCurrency(row)}`;
    }
    function buildTradeSummary() {
      const positions = new Map();
      const realizedByIndex = new Map();
      const source = data.purchaseRecords.map((row, index) => ({ row, index })).sort((a, b) => {
        const dateDiff = String(a.row.date || "").localeCompare(String(b.row.date || ""));
        return dateDiff || a.index - b.index;
      });
      const totals = { buyTwd: 0, sellTwd: 0, realizedTwd: 0, soldBasisTwd: 0 };
      source.forEach(({ row, index }) => {
        const type = tradeType(row);
        const currency = tradeCurrency(row);
        const fx = fxRate(currency);
        const shares = Number(row.shares) || 0;
        const gross = shares * (Number(row.price) || 0);
        const fees = (Number(row.fee) || 0) + (Number(row.tax) || 0);
        const key = tradeKey(row);
        const position = positions.get(key) || { market: row.market || "TW", currency, code: row.code || "", name: row.name || "", bought: 0, sold: 0, shares: 0, basis: 0, realized: 0, soldBasis: 0 };
        position.name = row.name || position.name;
        position.market = row.market || position.market;
        if (type === "sell") {
          const avgCost = position.shares ? position.basis / position.shares : 0;
          const soldBasis = avgCost * shares;
          const proceeds = Math.max(0, gross - fees);
          const realized = proceeds - soldBasis;
          position.sold += shares;
          position.shares -= shares;
          position.basis -= soldBasis;
          position.realized += realized;
          position.soldBasis += soldBasis;
          totals.sellTwd += proceeds * fx;
          totals.realizedTwd += realized * fx;
          totals.soldBasisTwd += soldBasis * fx;
          realizedByIndex.set(index, realized);
        } else {
          const cost = gross + fees;
          position.bought += shares;
          position.shares += shares;
          position.basis += cost;
          totals.buyTwd += cost * fx;
          realizedByIndex.set(index, null);
        }
        if (position.shares < 0) position.shares = 0;
        if (position.basis < 0) position.basis = 0;
        positions.set(key, position);
      });
      return { totals, realizedByIndex, positions: [...positions.values()] };
    }

            const prev = rows.filter(item => item.date < r.date).at(-1);
            const rowDelta = prev ? r.totalGain - prev.totalGain : 0;
            return `<tr><td>${textInput(r.date, `pnlCalendar.${i}.date`)}</td><td>${textInput(r.twGain, `pnlCalendar.${i}.twGain`, "number")}</td><td>${textInput(r.usGain, `pnlCalendar.${i}.usGain`, "number")}</td><td>${textInput(r.totalGain, `pnlCalendar.${i}.totalGain`, "number")}</td><td class="${rowDelta >= 0 ? "ok" : "gain"}">${rowDelta >= 0 ? "+" : ""}${money(rowDelta)}</td><td>${textInput(r.note, `pnlCalendar.${i}.note`)}</td><td><button class="icon-btn" data-del="pnlCalendar.${i}">刪</button></td></tr>`;
          }).join("")}</tbody>
        </table></div></article>`;
    }
    function renderGeneric(key, title) {
      if (key === "expense") {
        return `${section(key, title, "規畫固定或週期性支出。", `<button class="btn green small" data-add="budget">+ 新增支出</button>`)}
          <article class="panel"><div class="table-wrap"><table><thead><tr><th>項目</th><th>金額</th><th>週期</th><th>備註</th><th>操作</th></tr></thead><tbody>${data.budget.map((r, i) => `<tr><td>${textInput(r.item, `budget.${i}.item`)}</td><td>${textInput(r.amount, `budget.${i}.amount`, "number")}</td><td>${textInput(r.cycle, `budget.${i}.cycle`)}</td><td>${textInput(r.note, `budget.${i}.note`)}</td><td><button class="icon-btn" data-del="budget.${i}">刪</button></td></tr>`).join("")}</tbody></table></div></article>`;
      }
      if (key === "allocation") {
        return `${section(key, title, "規畫額外資金的分配比例。", `<button class="btn green small" data-add="allocation">+ 新增分配項目</button>`)}
          <article class="panel"><div class="table-wrap"><table><thead><tr><th>目標</th><th>分配比例</th><th>每 100,000 預估金額</th><th>操作</th></tr></thead><tbody>${data.allocation.map((r, i) => `<tr><td>${textInput(r.target, `allocation.${i}.target`)}</td><td>${textInput(r.ratio, `allocation.${i}.ratio`, "number")}%</td><td>${money(r.ratio * 1000)}</td><td><button class="icon-btn" data-del="allocation.${i}">刪</button></td></tr>`).join("")}</tbody></table></div></article>`;
      }
      const t = allTotals();
      const twRatio = t.total ? (t.tw / t.total * 100).toFixed(1) : "0.0";
      const usRatio = t.total ? (t.us / t.total * 100).toFixed(1) : "0.0";
      return `${section(key, title, "目前提供資產總覽卡片。")}
        <div class="cards">${card("目前淨資產", money(t.total), "TWD", "dark")}${card("可投入現金", money(t.cash - t.cards), "TWD")}${card("台股比重", `${twRatio}%`, "目前配置")}${card("美股比重", `${usRatio}%`, "目前配置")}</div>
        <div class="notice">此區可作為後續圖表與資料檢視擴充區。</div>`;
    }
    function render() {
      renderTabs();
      document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === currentTab));
      document.getElementById("overview").innerHTML = renderOverview();
      document.getElementById("tw").innerHTML = renderStock("tw", "台股", "TWD");
      document.getElementById("us").innerHTML = renderStock("us", "美股", "USD");
      document.getElementById("cash").innerHTML = renderCash();
      document.getElementById("gold").innerHTML = renderMetals("gold");
      document.getElementById("silver").innerHTML = renderMetals("silver");
      document.getElementById("fund").innerHTML = renderFund();
      document.getElementById("dca").innerHTML = renderDcaEditable();
      document.getElementById("purchase").innerHTML = renderPurchaseRecords();
      document.getElementById("expense").innerHTML = renderGeneric("expense", "支出規畫");
      document.getElementById("allocation").innerHTML = renderGeneric("allocation", "額外資金分配");
      document.getElementById("chart").innerHTML = renderInfoCharts();
      wireInputs();
    }
    function setPath(path, value) {
      const parts = path.split(".");
      let ref = data;
      while (parts.length > 1) ref = ref[parts.shift()];
      ref[parts[0]] = value;
    }
    function delPath(path) {
      const [key, index] = path.split(".");
      if (key === "dcaTargets") {
        const target = ensureDcaTargets()[Number(index)];
        const code = target ? dcaCode(target, Number(index)) : "";
        if (code) {
          delete data.rates[`dca_${code}`];
          (data.dca || []).forEach(row => delete row[code]);
        }
      }
      data[key].splice(Number(index), 1);
      saveState();
      render();
    }
    function addRow(key) {
      const defaults = {
        tw: { code: "新代號", name: "新台股", shares: 0, cost: 0, price: 0 },
        us: { code: "NEW", name: "New US Stock", shares: 0, cost: 0, price: 0 },
        cash: { bank: "新銀行", currency: "TWD", amount: 0 },
        cards: { card: "新信用卡", amount: 0, due: "2026-07-31", note: "" },
        gold: { date: "2026-07-06", item: "新黃金", tael: 0, mace: 0, candareen: 0, li: 0, gram: 0, gold: 0, labor: 0, place: "" },
        silver: { date: "2026-07-06", item: "新白銀", qty: 0, oz: 1, cost: 0, note: "" },
        funds: { name: "新基金", units: 0, cost: 0, nav: 0 },
        dca: { month: localMonthString().replace("-", "."), ...Object.fromEntries(ensureDcaTargets().map((target, index) => {
          const code = dcaCode(target, index);
          return [code, Number(data.rates[`dca_${code}`]) || 0];
        })) },
        dcaTargets: { code: `TARGET${ensureDcaTargets().length + 1}`, name: "" },
        purchaseRecords: { date: localDateString(), type: "buy", market: "TW", currency: "TWD", code: "", name: "", shares: 0, price: 0, fee: 0, tax: 0, note: "" },
        dividends: { date: localDateString(), source: "", currency: "TWD", amount: 0, note: "" },
        budget: { item: "新支出", amount: 0, cycle: "每月", note: "" },
        pnlCalendar: makeTodaySnapshot(),
        allocation: { target: "新分配", ratio: 0 }
      };
      data[key].push(defaults[key]);
      saveState();
      render();
    }
    function makeTodaySnapshot() {
      const gain = currentStockGain();
      return {
        date: localDateString(),
        twGain: Math.round(gain.twGain),
        usGain: Math.round(gain.usGain),
        totalGain: Math.round(gain.twGain + gain.usGain),
        note: "一鍵快照"
      };
    }
    function recordTodaySnapshot() {
      const snapshot = makeTodaySnapshot();
      const index = data.pnlCalendar.findIndex(row => row.date === snapshot.date);
      if (index >= 0) {
        data.pnlCalendar[index] = { ...data.pnlCalendar[index], ...snapshot };
        toast("已更新今日快照");
      } else {
        data.pnlCalendar.push(snapshot);
        toast("已新增今日快照");
      }
      calendarMonth = snapshot.date.slice(0, 7);
      localStorage.setItem(storageKey, JSON.stringify(data));
      render();
    }
    function recordAssetSnapshot() {
      const snapshot = makeAssetSnapshot();
      const index = data.assetSnapshots.findIndex(row => row.date === snapshot.date);
      if (index >= 0) {
        data.assetSnapshots[index] = { ...data.assetSnapshots[index], ...snapshot };
        toast("已更新今日資產快照");
      } else {
        data.assetSnapshots.push(snapshot);
        toast("已新增今日資產快照");
      }
      saveState();
      render();
    }
    function wireInputs() {
      document.querySelectorAll("[data-path]").forEach(el => {
        el.addEventListener("input", () => {
          if (el.type === "checkbox") return;
          const value = el.type === "number" ? Number(el.value) : el.value;
          setPath(el.dataset.path, value);
          saveState();
        });
        el.addEventListener("change", () => {
          let value = el.type === "checkbox" ? el.checked : el.value;
          if (el.type === "number") value = Number(value);
          setPath(el.dataset.path, value);
          saveState();
          render();
        });
      });
      document.querySelectorAll("[data-dca-code]").forEach(el => {
        el.addEventListener("change", () => {
          renameDcaTarget(Number(el.dataset.dcaCode), el.value);
          saveState();
          render();
        });
      });
      document.querySelectorAll("[data-del]").forEach(el => el.addEventListener("click", () => delPath(el.dataset.del)));
      document.querySelectorAll("[data-add]").forEach(el => el.addEventListener("click", () => addRow(el.dataset.add)));
      document.querySelectorAll("[data-snapshot-pnl]").forEach(el => el.addEventListener("click", recordTodaySnapshot));
      document.querySelectorAll("[data-asset-snapshot]").forEach(el => el.addEventListener("click", recordAssetSnapshot));
      document.querySelectorAll("[data-calendar-prev]").forEach(el => el.addEventListener("click", () => { calendarMonth = shiftMonth(calendarMonth || localMonthString(), -1); render(); }));
      document.querySelectorAll("[data-calendar-next]").forEach(el => el.addEventListener("click", () => { calendarMonth = shiftMonth(calendarMonth || localMonthString(), 1); render(); }));
    }
    function download(name, text, type) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([text], { type }));
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    }
    function exportCsv() {
      const rows = [["類別", "代號/項目", "名稱", "數量", "成本", "現價/金額", "現值"]];
      data.tw.forEach(r => rows.push(["台股", r.code, r.name, r.shares, r.cost, r.price, r.shares * r.price]));
      data.us.forEach(r => rows.push(["美股", r.code, r.name, r.shares, r.cost, r.price, r.shares * r.price]));
      data.cash.forEach(r => rows.push(["現金", r.currency, r.bank, "", "", r.amount, twdCash(r)]));
      data.gold.forEach(r => rows.push(["黃金", "", r.item, r.gram, r.gold + r.labor, data.rates.goldGram, r.gram * data.rates.goldGram]));
      data.silver.forEach(r => rows.push(["白銀", "", r.item, r.qty * r.oz, r.cost, data.rates.silverOz, r.qty * r.oz * data.rates.silverOz]));
      const tradeSummary = buildTradeSummary();
      data.purchaseRecords.forEach((r, i) => rows.push(["股票交易紀錄", r.code, `${r.date} ${tradeType(r) === "sell" ? "賣出" : "買入"} ${r.market} ${r.name}`, r.shares, purchaseCost(r), r.price, tradeSummary.realizedByIndex.get(i) ?? ""]));
      data.pnlCalendar.forEach(r => rows.push(["損益快照", r.date, r.note, "", r.twGain, r.usGain, r.totalGain]));
      download("personal-assets-demo.csv", rows.map(r => r.map(v => `"${String(v).replaceAll('"', '""')}"`).join(",")).join("\n"), "text/csv;charset=utf-8");
    }
    function exportSymbols() {
      const payload = {
        generatedAt: new Date().toISOString(),
        tw: data.tw.map(row => ({ code: row.code, name: row.name })).filter(row => row.code),
        us: data.us.map(row => ({ code: row.code, name: row.name })).filter(row => row.code)
      };
      download("price-symbols.json", JSON.stringify(payload, null, 2), "application/json");
      toast("已匯出 price-symbols.json");
    }
    function applyLatestPrices(payload) {
      const prices = payload.prices || {};
      let updated = 0;
      const updateRows = (rows, market) => {
        rows.forEach(row => {
          const key = `${market}:${String(row.code).toUpperCase()}`;
          const quote = prices[key] || prices[String(row.code).toUpperCase()] || prices[row.code];
          if (quote && Number.isFinite(Number(quote.price))) {
            row.price = Number(quote.price);
            updated += 1;
          }
        });
      };
      updateRows(data.tw, "TW");
      updateRows(data.us, "US");
      localStorage.setItem(storageKey, JSON.stringify(data));
      render();
      toast(updated ? `已更新 ${updated} 筆股價` : "沒有找到可套用的股價");
    }
    function applyLatestRates(payload) {
      const rates = payload.rates || {};
      let updated = 0;
      Object.entries(rates).forEach(([currency, value]) => {
        const code = normalizeCurrency(currency);
        const rate = Number(value);
        if (!code || code === "TWD" || !Number.isFinite(rate) || rate <= 0) return;
        data.fxRates[code] = rate;
        if (code === "USD") data.rates.usd = rate;
        updated += 1;
      });
      if (updated) {
        data.fxRates.TWD = 1;
        data.fxRateMeta = {
          generatedAt: payload.generatedAt || new Date().toISOString(),
          source: payload.source || "自動匯率"
        };
        localStorage.setItem(storageKey, JSON.stringify(data));
        render();
      }
      toast(updated ? `已更新 ${updated} 個幣別匯率` : "沒有找到可套用的匯率");
      return updated;
    }
    async function autoApplyLatestPrices() {
      if (!location.protocol.startsWith("http")) return;
      try {
        const response = await fetch(`latest-prices.json?ts=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) return;
        const payload = await response.json();
        if (!payload.prices || !Object.keys(payload.prices).length) return;
        applyLatestPrices(payload);
        const rateResponse = await fetch(`latest-rates.json?ts=${Date.now()}`, { cache: "no-store" });
        if (!rateResponse.ok) return;
        const ratePayload = await rateResponse.json();
        if (!ratePayload.rates || !Object.keys(ratePayload.rates).length) return;
        applyLatestRates(ratePayload);
      } catch {
        // file:// cannot reliably read sibling JSON; manual import remains available.
      }
    }
    async function updatePricesFromServer() {
      if (!location.protocol.startsWith("http")) {
        document.getElementById("priceJson").click();
        return;
      }
      const button = document.getElementById("importPrices");
      const original = button.textContent;
      button.disabled = true;
      button.textContent = "更新中...";
      try {
        const updateResponse = await fetch("/api/update-prices", { method: "POST" });
        if (!updateResponse.ok) throw new Error(`HTTP ${updateResponse.status}`);
        const result = await updateResponse.json();
        const [priceResponse, rateResponse] = await Promise.all([
          fetch(`latest-prices.json?ts=${Date.now()}`, { cache: "no-store" }),
          fetch(`latest-rates.json?ts=${Date.now()}`, { cache: "no-store" })
        ]);
        if (!priceResponse.ok) throw new Error("latest-prices.json not found");
        const payload = await priceResponse.json();
        const ratePayload = rateResponse.ok ? await rateResponse.json() : {};
        const hasPrices = payload.prices && Object.keys(payload.prices).length;
        const hasRates = ratePayload.rates && Object.keys(ratePayload.rates).length;
        if (!hasPrices && !hasRates) {
          toast(result.stderr ? "股價更新失敗，請檢查啟動視窗。" : "沒有抓到股價資料");
          return;
        }
        if (hasPrices) applyLatestPrices(payload);
        if (hasRates) applyLatestRates(ratePayload);
      } catch {
        toast("無法連線本機更新服務，請改用手動匯入。");
        document.getElementById("priceJson").click();
      } finally {
        button.disabled = false;
        button.textContent = original;
      }
    }
    function toast(msg) {
      const box = document.createElement("div");
      box.textContent = msg;
      box.style.cssText = "position:fixed;right:24px;bottom:24px;background:#101c34;color:#fff;padding:12px 16px;border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.18);z-index:10";
      document.body.appendChild(box);
      setTimeout(() => box.remove(), 1800);
    }
    document.addEventListener("click", (e) => {
      const tab = e.target.closest("[data-tab]");
      if (tab) {
        currentTab = tab.dataset.tab;
        render();
      }
    });
    document.getElementById("saveData").addEventListener("click", () => document.getElementById("importJson").click());
    document.getElementById("importJson").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const payload = JSON.parse(await file.text());
      if (payload.kind === "personal-assets-purchase-records") {
        const added = mergePurchaseRecords(payload.purchaseRecords || []);
        toast(`已匯入 ${added} 筆交易紀錄，重複資料已略過`);
      } else {
        data = hydrateData(payload);
        toast("已匯入完整存檔");
      }
      localStorage.setItem(storageKey, JSON.stringify(data));
      render();
      e.target.value = "";
    });
    document.getElementById("priceJson").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const payload = JSON.parse(await file.text());
      if (payload.rates) {
        applyLatestRates(payload);
      } else {
        applyLatestPrices(payload);
      }
      e.target.value = "";
    });
    document.getElementById("exportJson").addEventListener("click", () => download("personal-assets-demo.json", JSON.stringify(data, null, 2), "application/json"));
    document.getElementById("exportCsv").addEventListener("click", exportCsv);
    document.getElementById("exportSymbols").addEventListener("click", exportSymbols);
    document.getElementById("importPrices").addEventListener("click", updatePricesFromServer);
    document.getElementById("resetData").addEventListener("click", () => {
      if (confirm("確定要清除目前所有資料嗎？")) {
        data = structuredClone(seed);
        persist();
        render();
      }
    });
    render();
    autoApplyLatestPrices();
  </script>
</body>
</html>
