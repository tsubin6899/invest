<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>個人資產儀表板｜阿斌Tsubin</title>
  <meta name="theme-color" content="#101c34">
  <meta name="application-name" content="阿斌資產儀表板">
  <meta name="apple-mobile-web-app-title" content="阿斌資產儀表板">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --bg: #f4f8fb;
      --panel: #ffffff;
      --panel-2: #f6f8fb;
      --ink: #142033;
      --muted: #667485;
      --line: #dfe6ee;
      --navy: #101c34;
      --blue: #2368d8;
      --green: #24b370;
      --purple: #8b3fb6;
      --amber: #d99213;
      --red: #c64b4b;
      --teal: #207f86;
      --shadow: 0 14px 34px rgba(21, 32, 49, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: none;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .shell {
      width: min(1500px, calc(100vw - 34px));
      margin: 12px auto 32px;
      padding: 24px 28px 28px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,.82);
      box-shadow: var(--shadow);
    }
    .hero {
      min-height: 130px;
      padding: 30px 28px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(90deg, #dfeeff 0%, #f8fbff 48%, #fff 100%);
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 34px; line-height: 1.18; letter-spacing: 0; }
    .sub { margin-top: 10px; color: var(--muted); font-size: 14px; }
    .actions, .tabs, .toolbox {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .actions {
      justify-content: flex-end;
      min-height: 64px;
      margin: 20px 0;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fbfcfe;
    }
    .btn {
      min-height: 38px;
      border: 0;
      border-radius: 999px;
      padding: 8px 17px;
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
    }
    .btn.purple { background: var(--purple); }
    .btn.green { background: var(--green); }
    .btn.blue { background: var(--blue); }
    .btn.dark { background: #c75f3a; }
    .btn.small { min-height: 32px; padding: 6px 12px; font-size: 13px; }
    .icon-btn {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #fff;
      color: var(--muted);
    }
    .tabs {
      margin-bottom: 46px;
      padding: 10px 14px;
      border-radius: 14px;
      background: #f3f6fa;
      box-shadow: inset 0 0 0 1px rgba(223,230,238,.6);
    }
    .tab {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #263245;
      min-height: 36px;
      padding: 8px 14px;
      font-weight: 700;
    }
    .tab.active { background: var(--navy); color: #fff; }
    .view { display: none; }
    .view.active { display: block; }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 20px;
    }
    .view > .section-head:not(:first-child) {
      margin-top: 34px;
    }
    .section-head h2 { font-size: 28px; letter-spacing: 0; }
    .section-note { margin-top: 8px; color: var(--muted); font-size: 14px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .card, .panel {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 10px 26px rgba(21,32,49,.05);
    }
    .card {
      min-height: 132px;
      padding: 22px 20px;
    }
    .card.dark { background: linear-gradient(135deg, #101c34, #1d3a82); color: #fff; }
    .card.accent { background: #eef6ff; border-color: #7bb4be; }
    .label { color: var(--muted); font-size: 14px; }
    .dark .label { color: rgba(255,255,255,.78); }
    .number {
      display: block;
      margin-top: 8px;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0;
    }
    .unit { color: var(--muted); font-size: 13px; }
    .gain { color: var(--red); }
    .ok { color: var(--green); }
    .amber { color: var(--amber); }
    .panel { overflow: hidden; margin-top: 16px; }
    .panel-pad { padding: 18px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 920px; font-size: 14px; }
    th, td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 12px 12px;
      text-align: left;
      vertical-align: middle;
    }
    th:last-child, td:last-child { border-right: 0; }
    th { background: #f3f6fa; color: #334155; font-weight: 700; }
    tr:last-child td { border-bottom: 0; }
    input, select {
      min-height: 34px;
      border: 1px solid #cfd8e3;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 7px 9px;
      max-width: 100%;
    }
    input[type="number"] { width: 118px; }
    input[type="checkbox"] {
      width: 32px;
      height: 32px;
      accent-color: var(--green);
    }
    .toolbar {
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fbfcfe;
    }
    .search { min-width: 250px; }
    .gold-summary {
      padding: 22px 18px;
      line-height: 2.15;
      font-size: 16px;
    }
    .gold-summary strong {
      color: var(--amber);
      font-size: 34px;
      margin: 0 8px;
    }
    .muted { color: var(--muted); }
    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
    }
    .asset-grid {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 22px;
      align-items: center;
    }
    .donut {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: var(--donut-bg, conic-gradient(var(--blue) 0 var(--tw), var(--green) var(--tw) var(--us), var(--amber) var(--us) var(--cash), var(--purple) var(--cash) 360deg));
      position: relative;
      margin: auto;
    }
    .donut:after {
      content: "";
      position: absolute;
      inset: 54px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid var(--line);
    }
    .donut-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      z-index: 1;
      text-align: center;
    }
    .legend { display: grid; gap: 12px; }
    .legend-row {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }
    .chart-pair {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin: 16px 0;
    }
    .chart-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 18px;
    }
    .chart-card h3 {
      margin: 0 0 14px;
      font-size: 18px;
    }
    .portfolio-donut {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: var(--chart-bg, #eef2f7);
      position: relative;
      margin: 0 auto 16px;
    }
    .portfolio-donut:after {
      content: "";
      position: absolute;
      inset: 48px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid var(--line);
    }
    .portfolio-donut .donut-text strong {
      font-size: 20px;
    }
    .chart-empty {
      min-height: 210px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: #f8fafc;
      border: 1px dashed #cfd8e3;
      border-radius: 14px;
      margin-bottom: 16px;
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--c); }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .bar-list { display: grid; gap: 12px; }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) minmax(180px, 2fr) auto;
      gap: 12px;
      align-items: center;
      font-size: 14px;
    }
    .bar-track {
      height: 12px;
      border-radius: 999px;
      background: #edf2f7;
      overflow: hidden;
    }
    .bar-fill {
      display: block;
      height: 100%;
      width: var(--w);
      background: var(--bar, var(--blue));
      border-radius: inherit;
    }
    .trend-line {
      width: 100%;
      min-height: 240px;
    }
    .trend-line svg {
      display: block;
      width: 100%;
      height: 240px;
    }
    .trend-line .axis {
      stroke: #d6dee8;
      stroke-width: 1;
    }
    .trend-line .series {
      fill: none;
      stroke: var(--blue);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .trend-line .point { fill: var(--blue); }
    .notice {
      margin-top: 14px;
      padding: 14px 16px;
      border: 1px dashed #cfd8e3;
      border-radius: 12px;
      color: var(--muted);
      background: #fbfcfe;
      line-height: 1.7;
    }
    .dashboard-alerts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .alert-tile {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 13px 14px;
      border: 1px solid rgba(222,210,191,.9);
      border-radius: 8px;
      background: rgba(255,253,247,.92);
      box-shadow: 0 10px 28px rgba(0,0,0,.08);
    }
    .alert-tile strong {
      display: block;
      margin-bottom: 3px;
      color: var(--ink);
    }
    .alert-tile span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .alert-tile.accent {
      border-color: rgba(201,134,43,.5);
      background: #fff6e6;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .meta-item {
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .meta-item small {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
    }
    .meta-item strong {
      font-size: 14px;
    }
    body.privacy-mode .number,
    body.privacy-mode .donut-text strong,
    body.privacy-mode .legend-row span:last-child,
    body.privacy-mode .compare-line em,
    body.privacy-mode .compare-delta,
    body.privacy-mode .day-card .delta,
    body.privacy-mode .snapshot-amount,
    body.privacy-mode .accounting-amount,
    body.privacy-mode td,
    body.privacy-mode input[type="number"] {
      color: transparent !important;
      text-shadow: 0 0 9px rgba(32,36,44,.5);
    }
    .mobile-quick-nav {
      display: none;
    }
    .setting-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .setting-tile {
      min-height: 92px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }
    .setting-tile .label {
      display: block;
      margin-bottom: 8px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .setting-tile input {
      width: 100%;
      max-width: 100%;
      min-height: 34px;
      font-size: 16px;
      font-weight: 700;
    }
    .setting-tile .unit {
      display: block;
      margin-top: 7px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .day-card {
      min-height: 116px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      display: grid;
      align-content: start;
      gap: 7px;
    }
    .day-card.empty {
      background: #f8fafc;
      border-style: dashed;
    }
    .day-card strong { font-size: 15px; }
    .day-card .delta { font-size: 18px; font-weight: 800; }
    .day-card small { color: var(--muted); line-height: 1.45; }
    @media (max-width: 1100px) {
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .asset-grid, .split, .chart-pair, .chart-grid { grid-template-columns: 1fr; }
      .calendar-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .tabs { margin-bottom: 28px; }
    }
    @media (max-width: 720px) {
      body { background: #eef4f8; }
      .shell {
        width: 100%;
        margin: 0;
        border: 0;
        border-radius: 0;
        padding: 10px;
        padding-bottom: calc(96px + env(safe-area-inset-bottom));
        box-shadow: none;
      }
      .hero {
        min-height: 88px;
        padding: 18px 16px;
        border-radius: 14px;
        background: linear-gradient(115deg, #dfeeff 0%, #f8fbff 68%, #fff 100%);
      }
      h1 { font-size: 23px; line-height: 1.22; }
      .sub { margin-top: 7px; font-size: 12px; line-height: 1.45; }
      .actions {
        justify-content: flex-start;
        flex-wrap: nowrap;
        gap: 8px;
        min-height: 0;
        margin: 10px 0;
        padding: 9px;
        border-radius: 12px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .actions::-webkit-scrollbar, .tabs::-webkit-scrollbar { display: none; }
      .btn {
        min-height: 34px;
        padding: 7px 12px;
        font-size: 12px;
        flex: 0 0 auto;
      }
      .btn.small { min-height: 30px; padding: 6px 10px; font-size: 12px; }
      .tabs {
        flex-wrap: nowrap;
        gap: 7px;
        margin-bottom: 20px;
        padding: 8px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .tab {
        flex: 0 0 auto;
        min-height: 32px;
        padding: 7px 11px;
        font-size: 12px;
      }
      .section-head {
        align-items: flex-start;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 9px;
        margin-bottom: 12px;
      }
      .section-head > div:first-child {
        flex: 1 0 100%;
      }
      .view > .section-head:not(:first-child) {
        margin-top: 26px;
      }
      .section-head h2 { font-size: 22px; }
      .section-note { margin-top: 5px; font-size: 12px; line-height: 1.5; }
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
        margin-bottom: 12px;
      }
      .card {
        min-height: 94px;
        padding: 13px 12px;
        border-radius: 12px;
      }
      .label { font-size: 12px; line-height: 1.35; }
      .number {
        margin-top: 6px;
        font-size: 24px;
        line-height: 1.08;
        overflow-wrap: anywhere;
      }
      .unit { font-size: 11px; line-height: 1.35; }
      .panel { margin-top: 11px; border-radius: 12px; }
      .panel-pad { padding: 13px; }
      .toolbar {
        align-items: stretch;
        gap: 8px;
        margin-bottom: 10px;
        padding: 10px;
      }
      .toolbar input, .toolbar select, .search {
        width: 100%;
        min-width: 0;
      }
      input, select {
        min-height: 31px;
        border-radius: 7px;
        padding: 6px 8px;
        font-size: 12px;
      }
      input[type="number"] { width: 92px; }
      .table-wrap {
        margin: 0 -1px;
        -webkit-overflow-scrolling: touch;
      }
      table {
        min-width: 760px;
        font-size: 12px;
      }
      th, td { padding: 8px 8px; }
      .asset-grid { gap: 14px; }
      .donut {
        width: 176px;
        height: 176px;
      }
      .donut:after { inset: 42px; }
      .legend { gap: 8px; font-size: 12px; }
      .legend-row {
        grid-template-columns: 10px minmax(0, 1fr) auto;
        gap: 7px;
        font-size: 12px;
      }
      .chart-pair, .chart-grid {
        grid-template-columns: 1fr;
        gap: 10px;
        margin: 10px 0;
      }
      .chart-card {
        padding: 13px;
        border-radius: 12px;
      }
      .chart-card h3 {
        margin-bottom: 10px;
        font-size: 15px;
      }
      .portfolio-donut {
        width: 164px;
        height: 164px;
        margin-bottom: 12px;
      }
      .portfolio-donut:after { inset: 39px; }
      .portfolio-donut .donut-text strong { font-size: 16px; }
      .chart-empty { min-height: 130px; margin-bottom: 10px; font-size: 12px; }
      .bar-list { gap: 9px; }
      .bar-row {
        grid-template-columns: minmax(86px, 1fr) minmax(96px, 1.4fr) auto;
        gap: 8px;
        font-size: 12px;
      }
      .bar-track { height: 9px; }
      .trend-line { min-height: 170px; }
      .trend-line svg { height: 170px; }
      .setting-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      .fx-rate-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .setting-tile {
        min-height: 78px;
        padding: 10px;
        border-radius: 10px;
      }
      .setting-tile input { min-height: 31px; font-size: 13px; }
      .fx-rate-grid .setting-tile {
        min-height: 92px;
        padding: 9px 7px;
      }
      .fx-rate-grid .setting-tile .label {
        margin-bottom: 6px;
        font-size: 12px;
      }
      .fx-rate-grid .setting-tile input {
        min-height: 30px;
        padding: 5px 6px;
        border-radius: 7px;
        font-size: 12px;
      }
      .fx-rate-grid .setting-tile .unit {
        margin-top: 6px;
        font-size: 10px;
        line-height: 1.25;
      }
      .gold-summary {
        padding: 14px 12px;
        font-size: 13px;

      }
      .gold-summary strong {
        font-size: 24px;

      }

        grid-template-columns: repeat(3, minmax(0, 1fr));

      }

        min-height: 78px;
        padding: 9px;
        border-radius: 10px;
      }
      .day-card strong { font-size: 13px; }
      .day-card .delta { font-size: 14px; }
      .day-card small { font-size: 11px; line-height: 1.35; }
      .notice { margin-top: 10px; padding: 11px 12px; font-size: 12px; }
      .icon-btn {
        width: 30px;
        height: 30px;
        font-size: 12px;
      }
      .mobile-quick-nav {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: calc(8px + env(safe-area-inset-bottom));
        z-index: 30;
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        padding: 7px;
        border: 1px solid rgba(23,32,51,.18);
        border-radius: 12px;
        background: rgba(255,253,247,.95);
        box-shadow: 0 18px 42px rgba(0,0,0,.22);
        backdrop-filter: blur(12px);
      }
      .mobile-quick-nav button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: #172033;
        font-size: 11px;
        font-weight: 750;
      }
      .mobile-quick-nav button.active,
      .mobile-quick-nav button.primary {
        background: #172033;
        color: #fffdf7;
      }
    }
    @media (max-width: 420px) {
      .shell {
        padding: 8px;
        padding-bottom: calc(96px + env(safe-area-inset-bottom));
      }
      h1 { font-size: 21px; }
      .hero { padding: 16px 14px; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .number { font-size: 21px; }
      .card { min-height: 88px; padding: 12px 10px; }
      .setting-grid { grid-template-columns: 1fr; }
      .fx-rate-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .bar-row {
        grid-template-columns: 1fr;
        gap: 5px;
      }
      .bar-row span:last-child { justify-self: start; }
    }
    :root {
      --bg: #edf0f2;
      --panel: #fffdf7;
      --panel-2: #f6f0e6;
      --ink: #20242c;

    async function loadPublicConfig() {
      const fallback = {
        supabaseUrl: window.SUPABASE_URL || "",
        supabaseAnonKey: window.SUPABASE_ANON_KEY || ""
      };
      if (!location.protocol.startsWith("http")) return fallback;
      try {
        const response = await fetch(`/api/public-config?ts=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) return fallback;
        const config = await response.json();
        return {
          supabaseUrl: config.supabaseUrl || fallback.supabaseUrl,
          supabaseAnonKey: config.supabaseAnonKey || fallback.supabaseAnonKey
        };
      } catch {
        return fallback;
      }
    }
    function cloudRedirectUrl() {

      return `${location.origin}${location.pathname}`;

      if (!location.protocol.startsWith("http")) return;

      }

    async function initCloudSync() {

        setCloudStatus("SDK 未載入");

      if (!config.supabaseUrl || !config.supabaseAnonKey) {

        updateCloudControls();
        return;

      supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
          storageKey: "tsubin-assets-auth"

      cloudReady = true;
      const { data: sessionData } = await supabaseClient.auth.getSession();
      cloudUser = sessionData.session?.user || null;
      supabaseClient.auth.onAuthStateChange((_event, session) => {
        cloudUser = session?.user || null;
        if (session?.user) cleanCloudAuthUrl();
        updateCloudControls();
      });
      updateCloudControls();

        .select("data")

      const hasLocalAccounting = Boolean(

        (localAccounting.transfers || []).length ||
        (localAccounting.creditBills || []).length ||
        (localAccounting.creditInstallments || []).length ||
        (localAccounting.templates || []).length ||
        (localAccounting.recurringRules || []).length ||
        (localAccounting.budgets || []).length ||
        (localAccounting.reconciliations || []).length
      );
      payload.accountingLedger = hasLocalAccounting ? localAccounting : existingRow?.data?.accountingLedger;
      const { error } = await supabaseClient
        .from(cloudTable)
        .upsert({ user_id: cloudUser.id, data: payload }, { onConflict: "user_id" });

        return;

      const { data: row, error } = await supabaseClient
        .from(cloudTable)
        .select("data, updated_at")
        .eq("user_id", cloudUser.id)
        .maybeSingle();
      if (error) {
        toast(`雲端載入失敗：${error.message}`);
        return;
      }
      if (!row?.data) {
        toast("雲端尚無資料，已保留本機資料");
        return;
      }
      data = hydrateData(row.data);
      if (row.data.accountingLedger) {
        localStorage.setItem(accountingStorageKey, JSON.stringify(row.data.accountingLedger));
      }
      saveState();
      markMeta("lastCloudLoadAt");
      render();
      toast("已載入雲端資料");

    function hydrateData(payload) {
      return {
        ...structuredClone(seed),
        ...(payload || {}),
        rates: { ...seed.rates, ...((payload || {}).rates || {}) },
        fxRates: { ...seed.fxRates, ...((payload || {}).fxRates || {}) },
        fxRateMeta: { ...seed.fxRateMeta, ...((payload || {}).fxRateMeta || {}) },
        safety: { ...seed.safety, ...((payload || {}).safety || {}) },
        targetAllocation: { ...seed.targetAllocation, ...((payload || {}).targetAllocation || {}) }
      };
    }
    function purchaseRecordKey(row) {
      return [
        row.date || "",
        tradeType(row),
        String(row.market || "TW").toUpperCase(),
        tradeCurrency(row),
        String(row.code || "").toUpperCase(),
        String(row.name || "").trim(),
        Number(row.shares) || 0,
        Number(row.price) || 0,
        Number(row.fee) || 0,
        Number(row.tax) || 0,
        String(row.note || "").trim()
      ].join("|");
    }
    function mergePurchaseRecords(records) {
      const existing = new Set((data.purchaseRecords || []).map(purchaseRecordKey));
      let added = 0;
      (records || []).forEach(row => {
        const key = purchaseRecordKey(row);
        if (existing.has(key)) return;
        data.purchaseRecords.push(row);
        existing.add(key);
        added += 1;
      });
      return added;
    }
    function money(n, currency = "TWD") {
      return new Intl.NumberFormat("zh-TW", { maximumFractionDigits: currency === "USD" ? 2 : 0 }).format(Number(n) || 0);
    }
    function moneyFixed(n, currency = "TWD", digits = 2) {
      return new Intl.NumberFormat("zh-TW", { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(Number(n) || 0);
    }
    function rateText(n) {
      return new Intl.NumberFormat("zh-TW", { minimumFractionDigits: 0, maximumFractionDigits: 6 }).format(Number(n) || 0);
    }
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, match => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[match]));
    }
    function sum(rows, fn) { return rows.reduce((t, r) => t + fn(r), 0); }
    function normalizeCurrency(value) { return String(value || "TWD").trim().toUpperCase(); }
    function fxRate(currency) { return Number(data.fxRates?.[normalizeCurrency(currency)] ?? 1) || 1; }
    function twdCash(row) { return (Number(row.amount) || 0) * fxRate(row.currency); }
    function stockValue(rows, fx = 1) { return sum(rows, r => r.shares * r.price * fx); }
    function stockCost(rows, fx = 1) { return sum(rows, r => r.shares * r.cost * fx); }
    function goldCost() { return sum(data.gold, r => r.gold + r.labor); }
    function goldGram() { return sum(data.gold, r => r.gram); }
    function silverCost() { return sum(data.silver, r => r.cost); }
    function silverOz() { return sum(data.silver, r => r.qty * r.oz); }
    function allTotals() {
      const tw = stockValue(data.tw);
      const us = stockValue(data.us, data.rates.usd);
      const cash = sum(cashRows(), twdCash) + (Number(data.rates.reserve) || 0);
      const cards = sum(data.cards, r => r.amount);
      const gold = goldGram() * data.rates.goldGram;
      const silver = silverOz() * data.rates.silverOz;
      const fundTwd = sum(data.funds, r => r.units * r.nav);
      const usdFund = sum(data.usdFunds || [], r => r.units * r.nav) * data.rates.usd;
      const fund = fundTwd + usdFund;
      const total = tw + us + cash + gold + silver + fund - cards;
      const fundCost = sum(data.funds, r => r.cost) + sum(data.usdFunds || [], r => r.cost) * data.rates.usd;
      const cost = stockCost(data.tw) + stockCost(data.us, data.rates.usd) + goldCost() + silverCost() + fundCost;
      const gain = (tw + us + gold + silver + fund) - cost;
      return { tw, us, cash, cards, gold, silver, fund, fundTwd, usdFund, total, cost, gain };
    }
    function card(label, value, unit, cls = "") {
      return `<article class="card ${cls}"><span class="label">${label}</span><strong class="number">${value}</strong><span class="unit">${unit}</span></article>`;
    }
    function settingTile(label, value, unit) {

    }
    function loadAccountingLedger() {
      try {
        const saved = JSON.parse(localStorage.getItem(accountingStorageKey) || "{}");
        return {
          ...saved,
          accounts: Array.isArray(saved.accounts) ? saved.accounts : [],
          entries: Array.isArray(saved.entries) ? saved.entries : [],
          transfers: Array.isArray(saved.transfers) ? saved.transfers : [],
          creditBills: Array.isArray(saved.creditBills) ? saved.creditBills : [],
          creditInstallments: Array.isArray(saved.creditInstallments) ? saved.creditInstallments : [],
          templates: Array.isArray(saved.templates) ? saved.templates : [],
          recurringRules: Array.isArray(saved.recurringRules) ? saved.recurringRules : [],
          budgets: Array.isArray(saved.budgets) ? saved.budgets : [],
          reconciliations: Array.isArray(saved.reconciliations) ? saved.reconciliations : []
        };
      } catch {
        return { accounts: [], entries: [], transfers: [], creditBills: [], creditInstallments: [], templates: [], recurringRules: [], budgets: [], reconciliations: [] };
      }
    }
    function accountingInstallmentAmount(row, index) {
      const total = Math.round(Number(row.totalAmount) || 0);
      const months = Math.max(1, Number(row.months) || 1);
      const base = Math.floor(total / months);
      const remainder = total - base * months;
      return base + (index < remainder ? 1 : 0);
    }
    function accountingFirstDayOfMonth(month) {
      return `${month || localMonthString()}-01`;
    }
    function accountingInstallmentEntries(ledger) {
      return (ledger.creditInstallments || []).flatMap(row =>
        Array.from({ length: Math.max(1, Number(row.months) || 1) }, (_, index) => ({
          type: "expense",
          date: accountingFirstDayOfMonth(shiftMonth(row.startMonth || localMonthString(), index)),
          amount: accountingInstallmentAmount(row, index),
          category: row.category,
          item: row.item,
          account: row.card,
          merchant: row.merchant,
          createdAt: row.createdAt,
          virtualInstallment: true
        }))
      );
    }
    function accountingAllEntryRows(ledger) {
      return [...(ledger.entries || []), ...accountingInstallmentEntries(ledger)];
    }
    function accountingAccountBalance(account, ledger) {
      const entryTotal = accountingAllEntryRows(ledger).reduce((total, row) => {
        if (row.account !== account.name) return total;
        const amount = Number(row.amount) || 0;
        return total + (row.type === "income" ? amount : -amount);
      }, Number(account.openingBalance) || 0);
      return (ledger.transfers || []).reduce((total, row) => {
        const fromAmount = Number(row.fromAmount) || 0;
        const toAmount = Number(row.toAmount) || 0;
        const feeAmount = Number(row.feeAmount) || 0;
        const feeAccount = row.feeAccount || row.fromAccount;
        let next = total;
        if (row.fromAccount === account.name) next -= fromAmount;
        if (row.toAccount === account.name) next += toAmount;
        if (feeAmount && feeAccount === account.name) next -= feeAmount;
        return next;
      }, entryTotal);
    }
    function cashRows() {
      const ledger = loadAccountingLedger();
      const rows = (ledger.accounts || [])
        .filter(account => account.type !== "信用卡")
        .map(account => ({
          bank: account.name,
          currency: normalizeCurrency(account.currency),
          amount: accountingAccountBalance(account, ledger),
          type: account.type,
          source: "accounting"
        }));
      return rows.length ? rows : data.cash;
    }
    function accountingRows(month = localMonthString()) {
      return loadAccountingLedger().entries
        .filter(row => String(row.date || "").startsWith(month))
        .sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")) || String(b.createdAt || "").localeCompare(String(a.createdAt || "")));
    }
    function accountingGroup(rows, key, type = "") {
      const grouped = new Map();
      rows.filter(row => !type || row.type === type).forEach(row => {
        const label = row[key] || "未分類";
        grouped.set(label, (grouped.get(label) || 0) + (Number(row.amount) || 0));
      });
      return [...grouped.entries()]
        .map(([label, value]) => ({ label, value, rawValue: value }))
        .sort((a, b) => b.value - a.value);
    }
    function localDateString(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");

      return `${year}-${month}-${day}`;

    function localMonthString(date = new Date()) {

    }
    function shiftMonth(month, delta) {

    }
    function textInput(value, path, type = "text") {

    function section(id, title, note = "", tools = "") {

    const chartColors = ["#2368d9", "#16a36a", "#d99a21", "#7c3aed", "#e25555", "#0891b2", "#db2777", "#64748b", "#84cc16", "#f97316"];
    function renderTabs() {

    function renderPieChart(title, items, totalLabel, currency) {
      const filtered = items.filter(item => Number(item.value) > 0);
      const total = sum(filtered, item => item.value);
      if (!total) {
        return `<article class="chart-card"><h3>${title}</h3><div class="chart-empty">尚無可呈現資料</div></article>`;
      }
      let cursor = 0;
      const segments = filtered.map((item, index) => {
        const start = cursor;
        const end = cursor + item.value / total * 360;
        cursor = end;
        return `${chartColors[index % chartColors.length]} ${start.toFixed(3)}deg ${end.toFixed(3)}deg`;
      }).join(", ");
      return `<article class="chart-card">
        <h3>${title}</h3>
        <div class="portfolio-donut" style="--chart-bg:conic-gradient(${segments});"><div class="donut-text"><strong>${money(total, currency)}</strong><span class="muted">${totalLabel}</span></div></div>
        <div class="legend">${filtered.map((item, index) => {
          const pct = item.value / total * 100;
          return `<div class="legend-row"><span class="dot" style="--c:${chartColors[index % chartColors.length]}"></span><strong>${item.label}</strong><span>${pct.toFixed(1)}%｜${money(item.rawValue ?? item.value, currency)}</span></div>`;
        }).join("")}</div>
      </article>`;
    }
    function renderStockCharts(rows, currency) {
      const valueItems = rows.map(row => ({

        value: Math.max(0, (Number(row.shares) || 0) * (Number(row.price) || 0))

        const value = (Number(row.shares) || 0) * (Number(row.price) || 0);

        const gain = value - cost;
        return {
          label: `${row.code || "-"} ${row.name || ""}`.trim(),

        };
      });
      return `<div class="chart-pair stock-overview-charts">

        ${renderPieChart("未實現損益各支股票比例", gainItems, "損益絕對值", currency)}

    function stockReturnRankRows(rows) {

    function renderTrendChart(title, rows) {
      const points = rows
        .filter(row => row.date && Number.isFinite(Number(row.totalGain)))
        .sort((a, b) => String(a.date).localeCompare(String(b.date)))
        .slice(-45);
      if (points.length < 2) {
        return `<article class="chart-card"><h3>${title}</h3><div class="chart-empty">至少需要兩筆快照</div></article>`;
      }
      const values = points.map(row => Number(row.totalGain) || 0);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = max - min || 1;
      const w = 640;
      const h = 240;
      const pad = 24;
      const coords = points.map((row, index) => {
        const x = pad + index / Math.max(points.length - 1, 1) * (w - pad * 2);
        const y = h - pad - ((Number(row.totalGain) || 0) - min) / span * (h - pad * 2);
        return { x, y, row };
      });
      const path = coords.map((p, index) => `${index ? "L" : "M"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
      return `<article class="chart-card"><h3>${title}</h3><div class="trend-line"><svg viewBox="0 0 ${w} ${h}" role="img" aria-label="${title}">
        <line class="axis" x1="${pad}" y1="${h - pad}" x2="${w - pad}" y2="${h - pad}"></line>
        <line class="axis" x1="${pad}" y1="${pad}" x2="${pad}" y2="${h - pad}"></line>
        <path class="series" d="${path}"></path>
        ${coords.map(p => `<circle class="point" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3"><title>${p.row.date} ${money(p.row.totalGain)}</title></circle>`).join("")}
      </svg></div><div class="legend"><div class="legend-row"><span class="dot" style="--c:var(--blue)"></span><strong>最新</strong><span>${money(values.at(-1))} TWD</span></div><div class="legend-row"><span class="dot" style="--c:var(--muted)"></span><strong>區間</strong><span>${money(min)} ~ ${money(max)} TWD</span></div></div></article>`;

    function legacyDcaCodes() {
      const codes = new Set();
      (data.dca || []).forEach(row => {
        Object.keys(row || {}).forEach(key => {
          if (key !== "month") codes.add(key);
        });
      });
      Object.keys(data.rates || {}).forEach(key => {
        if (key.startsWith("dca_")) codes.add(key.slice(4));
      });
      return [...codes].filter(Boolean);
    }
    function ensureDcaTargets() {
      if (!Array.isArray(data.dcaTargets)) data.dcaTargets = [];
      if (!data.dcaTargets.length) {
        const codes = legacyDcaCodes();
        data.dcaTargets = (codes.length ? codes : ["0050", "00981A", "VOO", "QQQ"]).map(code => ({ code, name: "" }));
      }
      data.dcaTargets.forEach((target, index) => {
        if (!target.code) target.code = `TARGET${index + 1}`;
        if (target.name == null) target.name = "";
      });
      return data.dcaTargets;
    }
    function dcaCode(target, index) {
      return String(target.code || `TARGET${index + 1}`).trim();
    }
    function dcaAmount(row, code) {
      const value = row ? row[code] : 0;
      if (typeof value === "boolean") return value ? Number(data.rates[`dca_${code}`]) || 1 : 0;
      return Number(value) || 0;
    }
    function renameDcaTarget(index, nextCode) {
      const targets = ensureDcaTargets();
      const target = targets[index];
      if (!target) return;
      const oldCode = dcaCode(target, index);
      const newCode = String(nextCode || "").trim() || oldCode;
      if (oldCode === newCode) return;
      target.code = newCode;
      const oldRateKey = `dca_${oldCode}`;
      const newRateKey = `dca_${newCode}`;
      if (data.rates[oldRateKey] != null && data.rates[newRateKey] == null) data.rates[newRateKey] = data.rates[oldRateKey];
      delete data.rates[oldRateKey];
      (data.dca || []).forEach(row => {
        if (row[oldCode] != null && row[newCode] == null) row[newCode] = row[oldCode];
        delete row[oldCode];
      });
    }
    function hasTodayPnlSnapshot() {
      const today = localDateString();
      return (data.pnlCalendar || []).some(row => row.date === today);
    }
    function hasTodayAssetSnapshot() {
      const today = localDateString();
      return (data.assetSnapshots || []).some(row => row.date === today);

    function purchaseCost(row) {
      const gross = (Number(row.shares) || 0) * (Number(row.price) || 0);
      const fees = (Number(row.fee) || 0) + (Number(row.tax) || 0);
      return tradeType(row) === "sell" ? Math.max(0, gross - fees) : gross + fees;
    }
    function purchaseCostTwd(row) {
      return purchaseCost(row) * fxRate(tradeCurrency(row));
    }
    function tradeType(row) {
      const value = String(row.type || row.action || "buy").toLowerCase();
      return value === "sell" || value.includes("賣") ? "sell" : "buy";
    }
    function tradeCurrency(row) {
      return normalizeCurrency(row.currency || (row.market === "US" ? "USD" : "TWD"));
    }
    function tradeKey(row) {
      return `${String(row.market || "TW").toUpperCase()}:${String(row.code || "").toUpperCase()}:${tradeCurrency(row)}`;
    }
    function buildTradeSummary() {
      const positions = new Map();
      const realizedByIndex = new Map();
      const source = data.purchaseRecords.map((row, index) => ({ row, index })).sort((a, b) => {
        const dateDiff = String(a.row.date || "").localeCompare(String(b.row.date || ""));
        return dateDiff || a.index - b.index;
      });
      const totals = { buyTwd: 0, sellTwd: 0, realizedTwd: 0, soldBasisTwd: 0 };
      source.forEach(({ row, index }) => {
        const type = tradeType(row);
        const currency = tradeCurrency(row);
        const fx = fxRate(currency);
        const shares = Number(row.shares) || 0;
        const gross = shares * (Number(row.price) || 0);
        const fees = (Number(row.fee) || 0) + (Number(row.tax) || 0);
        const key = tradeKey(row);
        const position = positions.get(key) || { market: row.market || "TW", currency, code: row.code || "", name: row.name || "", bought: 0, sold: 0, shares: 0, basis: 0, realized: 0, soldBasis: 0 };
        position.name = row.name || position.name;
        position.market = row.market || position.market;
        if (type === "sell") {
          const avgCost = position.shares ? position.basis / position.shares : 0;
          const soldBasis = avgCost * shares;
          const proceeds = Math.max(0, gross - fees);
          const realized = proceeds - soldBasis;
          position.sold += shares;
          position.shares -= shares;
          position.basis -= soldBasis;
          position.realized += realized;
          position.soldBasis += soldBasis;
          totals.sellTwd += proceeds * fx;
          totals.realizedTwd += realized * fx;
          totals.soldBasisTwd += soldBasis * fx;
          realizedByIndex.set(index, realized);
        } else {
          const cost = gross + fees;
          position.bought += shares;
          position.shares += shares;
          position.basis += cost;
          totals.buyTwd += cost * fx;
          realizedByIndex.set(index, null);
        }
        if (position.shares < 0) position.shares = 0;
        if (position.basis < 0) position.basis = 0;
        positions.set(key, position);
      });
      return { totals, realizedByIndex, positions: [...positions.values()] };
    }

    document.getElementById("cloudLogout").addEventListener("click", logoutCloudSync);
    document.getElementById("resetData").addEventListener("click", () => {
      if (confirm("確定要清除目前所有資料嗎？")) {
        data = structuredClone(seed);
        persist();
        render();
      }
    });
    render();
    window.addEventListener("focus", () => {
      if (currentTab === "bookkeeping") render();
    });
    window.addEventListener("storage", (event) => {
      if (event.key === accountingStorageKey && currentTab === "bookkeeping") render();
    });
    window.addEventListener("resize", updateHeaderOffset);
    initCloudSync();
    autoApplyLatestPrices();
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
